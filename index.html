<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SepETH Token Swap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>SepETH Token Swap</h1>

    <button id="connectBtn">Connect MetaMask</button>
    <p id="wallet">Not connected</p>
    <p id="tokenBalance">Token balance: -</p>

    <section>
      <h2>Buy Tokens</h2>
      <input id="buyAmount" type="number" placeholder="Number of tokens" />
      <button id="buyBtn">Swap SepETH for Tokens</button>
    </section>

    <section>
      <h2>Redeem Tokens</h2>
      <input id="redeemAmount" type="number" placeholder="Number of tokens" />
      <button id="redeemBtn">Swap Tokens for SepETH</button>
    </section>

    <section id="holderContent" class="hidden">
      <h2>Congrats, you have 50 Tokens</h2>
      <a href="your-file.pdf" download>Download PDF</a>
    </section>

    <p id="status"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
