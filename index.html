<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Token dApp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Course Token dApp</h1>

    <button id="connectButton">Connect MetaMask</button>
    <p id="wallet">Wallet not connected</p>

    <section>
      <h2>Buy Course Tokens</h2>
      <input id="ethAmount" type="number" min="0.001" step="0.001" placeholder="SepETH amount" />
      <p id="buyPreview">You will receive: 0 tokens</p>
      <button id="buyButton">Buy Tokens</button>
    </section>

    <section>
      <h2>Redeem Course Tokens</h2>
      <input id="redeemAmount" type="number" min="1" step="1" placeholder="Token amount" />
      <p id="redeemPreview">You will receive: 0 SepETH</p>
      <button id="redeemButton">Redeem Tokens</button>
    </section>

    <section>
      <h2>Mint NFT</h2>
      <p>Cost: 50 Course Tokens</p>
      <button id="mintButton">Mint NFT</button>
    </section>

    <section>
      <h2>Your Balance</h2>
      <button id="balanceButton">Check Balance</button>
      <p id="balance">-</p>
    </section>

    <section id="pdfSection" class="hidden">
      <h2>PDF Reward</h2>
      <p>Congrats, you have at least 50 Course Tokens.</p>
      <a href="wow_you_did_it.pdf" download>Download PDF</a>
    </section>

    <p id="status"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
